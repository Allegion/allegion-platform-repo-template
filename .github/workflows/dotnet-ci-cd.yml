# ============================================================
# .NET CI/CD Caller Workflow — Allegion Platform Template
# ============================================================
# SETUP CHECKLIST (complete before first PR):
#   1. Run scripts/setup-repo-variables.ps1 to create repo variables
#   2. Fill in every TODO below
#   3. Add GitHub environments: <env>-plan (unprotected) and <env> (protected)
#   4. Delete this comment block when done
#
# Repo variables required (set via setup script or GitHub UI):
#   vars.AZURE_CLIENT_ID       — App registration client ID
#   vars.AZURE_TENANT_ID       — Azure AD tenant ID
#   vars.AZURE_SUBSCRIPTION_ID — Azure subscription ID (Terraform only)
#
# Secrets required:
#   secrets.BLACKDUCK_API_TOKEN  — BlackDuck API token
#   secrets.SONARQUBE_TOKEN      — SonarQube token
# ============================================================

name: CI/CD - .NET          # TODO: rename to your project name

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================================
  # BUILD & TEST
  # ============================================================
  Build:
    uses: Allegion/allegion-platform-yaml-template-shared/.github/workflows/dotnet-reusable-ci.yml@main
    with:
      # --- .NET project -----------------------------------------
      dotnetVersion: '8.x'                   # TODO: match your target framework
      dotnetProjects: 'MyApp.sln'            # TODO: solution or project file
      dotnetPublishProjects: '**/*Api.csproj' # TODO: project(s) to publish
      dotnetWorkingDirectory: '.'            # TODO: subfolder if solution is not at root
      dotnetBuildConfig: 'Release'
      dotnetZipAfterPublish: true
      dotnetArtifactName: 'drop'

      # --- Azure auth -------------------------------------------
      azureOrganization: 'allegionit'        # TODO: update if different org
      azureTenantId: ${{ vars.AZURE_TENANT_ID }}
      azureClientId: ${{ vars.AZURE_CLIENT_ID }}

      # --- SonarQube --------------------------------------------
      # TODO: create project in SonarQube and set these keys
      sonarqubeProjectKey: 'github.Allegion.<your-repo-name>'
      sonarqubeProjectName: 'github.Allegion.<your-repo-name>'
      sonarqubeExclusions: '**/bin/**,**/obj/**,**/*.Tests/**'
      sonarqubeCoverageExclusions: '**/bin/**,**/obj/**,**/*.Tests/**'

      # --- BlackDuck --------------------------------------------
      # TODO: register project in BlackDuck hub
      blackduckProjectName: '<your-blackduck-project-name>'
      blackduckVersionName: 'main-ci-dotnet'

      # --- Runner -----------------------------------------------
      runner: ubuntu-latest

    secrets:
      BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

  # ============================================================
  # DEPLOY — DEV
  # Provision infra (Terraform) + deploy app
  # ============================================================
  Deploy-Dev:
    needs: [ Build ]
    uses: Allegion/allegion-platform-yaml-template-shared/.github/workflows/deploy-to-environments.yml@main
    with:
      artifactName: drop
      environment: dev              # TODO: must match a GitHub environment name
      planEnvironment: dev-plan     # TODO: unprotected env for Terraform plan

      # --- App type: uncomment ONE block below ------------------

      # Web API (Azure App Service):
      deployAPI: true
      # deployFunctionApp: true     # Function App — swap deployAPI for this

      # --- Terraform --------------------------------------------
      deployTerraform: true
      terraformWorkingDirectory: 'devops_script/terraform'  # TODO: path to .tf files
      tfvarsFile: 'dev.tfvars'
      terraformBackendConfigPath: 'devops_script/terraform/backendConfigs/dev-backendConfig.yml'
      terraformEnableConcurrency: true

      # --- Variables / tokenization ----------------------------
      variableYamlPath: 'devops_script/variables/dev-vars.yml' # TODO: path or remove

      # --- Wiz IaC scan (optional) -----------------------------
      wizEnabled: false             # TODO: set true when Wiz is configured
      wizPolicy: ''
      wizScanTags: 'cicd=gha,env=dev'
      wizFailOnPolicyHit: false

      runner: ubuntu-latest
    secrets: inherit

  # ============================================================
  # DEPLOY APPS — DEV (matrix: Function Apps / Web APIs / Frontends)
  # Add or remove entries from the matrix as needed.
  # ============================================================
  Deploy-Apps-Dev:
    name: Deploy ${{ matrix.deploy.type }} - ${{ matrix.deploy.name }}
    needs: [ Deploy-Dev ]
    runs-on: ${{ matrix.deploy.runner }}
    environment: dev
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deploy:
          # TODO: replace with your actual app names / types
          # Types: functionapp | webapp | frontend
          - type: webapp
            name: my-dev-api           # TODO: Azure App Service name
            package_glob: '*.zip'
            runner: ubuntu-latest
            variable_yaml: 'devops_script/variables/dev-vars.yml'
            appsettings_yaml: ''
            enable_tokenization: false
            tokenization_files: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.deploy.type }} - ${{ matrix.deploy.name }}
        uses: Allegion/allegion-platform-yaml-template-shared/.github/actions/deployments/deploy-app@main
        with:
          appType: ${{ matrix.deploy.type }}
          appName: ${{ matrix.deploy.name }}
          artifactName: drop
          packageGlob: ${{ matrix.deploy.package_glob }}
          variableYamlPath: ${{ matrix.deploy.variable_yaml }}
          appSettingsYamlPath: ${{ matrix.deploy.appsettings_yaml }}
          enableTokenization: ${{ matrix.deploy.enable_tokenization }}
          tokenizationFiles: ${{ matrix.deploy.tokenization_files }}
          azureClientId: ${{ vars.AZURE_CLIENT_ID }}
          azureTenantId: ${{ vars.AZURE_TENANT_ID }}
