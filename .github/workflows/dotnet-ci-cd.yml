# ============================================================
# .NET CI/CD Caller Workflow ? Allegion Platform Template
# ============================================================
# SETUP CHECKLIST (complete before first PR):
#   1. The setup-repo.yml workflow has already created your environments
#      and placeholder variables. Fill in the real values:
#      - AZURE_TENANT_ID        : Settings > Variables (repo level)
#      - AZURE_CLIENT_ID        : Settings > Environments > <env> > Variables
#      - AZURE_SUBSCRIPTION_ID  : Settings > Environments > <env> > Variables
#   2. Add secrets (cannot be automated):
#      - SONARQUBE_TOKEN        : Settings > Secrets > Actions
#      - BLACKDUCK_API_TOKEN    : Should already be an org secret
#   3. Fill in every TODO below
#   4. Delete this comment block when done
# ============================================================

name: CI/CD - .NET          # TODO: rename to your project name

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================================
  # BUILD & TEST
  # ============================================================
  Build:
    uses: Allegion/allegion-platform-yaml-template-shared/.github/workflows/dotnet-reusable-ci.yml@main
    with:
      # --- .NET project -----------------------------------------
      dotnetVersion: '8.x'                    # TODO: match your target framework
      dotnetProjects: 'MyApp.sln'             # TODO: solution or project file
      dotnetPublishProjects: '**/*Api.csproj' # TODO: project(s) to publish
      dotnetWorkingDirectory: '.'             # TODO: subfolder if solution is not at root
      dotnetBuildConfig: 'Release'
      dotnetZipAfterPublish: true
      dotnetArtifactName: 'drop'

      # --- Azure auth -------------------------------------------
      azureOrganization: 'allegionit'         # TODO: update if different org
      azureTenantId: ${{ vars.AZURE_TENANT_ID }}
      azureClientId: ${{ vars.AZURE_CLIENT_ID }}

      # --- SonarQube --------------------------------------------
      # TODO: create project in SonarQube and set these values
      sonarqubeProjectKey: 'github.Allegion.<your-repo-name>'
      sonarqubeProjectName: 'github.Allegion.<your-repo-name>'
      sonarqubeExclusions: '**/bin/**,**/obj/**,**/*.Tests/**'
      sonarqubeCoverageExclusions: '**/bin/**,**/obj/**,**/*.Tests/**'

      # --- BlackDuck --------------------------------------------
      # TODO: register project in BlackDuck hub
      blackduckProjectName: '<your-blackduck-project-name>'
      blackduckVersionName: 'main-ci-dotnet'

      runner: ubuntu-latest

    secrets:
      BLACKDUCK_API_TOKEN: ${{ secrets.BLACKDUCK_API_TOKEN }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

  # ============================================================
  # DEPLOY ? DEV
  # ============================================================
  Deploy-Dev:
    needs: [ Build ]
    uses: Allegion/allegion-platform-yaml-template-shared/.github/workflows/deploy-to-environments.yml@main
    with:
      artifactName: drop
      environment: dev
      planEnvironment: dev-plan

      # --- App type: uncomment ONE line below -------------------
      deployAPI: true
      # deployFunctionApp: true

      # --- Terraform --------------------------------------------
      deployTerraform: true
      terraformWorkingDirectory: 'devops_script/terraform'  # TODO: path to .tf files
      tfvarsFile: 'dev.tfvars'
      terraformBackendConfigPath: 'devops_script/terraform/backendConfigs/dev-backendConfig.yml'
      terraformEnableConcurrency: true

      variableYamlPath: 'devops_script/variables/dev-vars.yml' # TODO: path or remove

      wizEnabled: false
      wizPolicy: ''
      wizScanTags: 'cicd=gha,env=dev'
      wizFailOnPolicyHit: false

      runner: ubuntu-latest
    secrets: inherit

  # ============================================================
  # DEPLOY ? TEST
  # ============================================================
  Deploy-Test:
    needs: [ Deploy-Dev ]
    uses: Allegion/allegion-platform-yaml-template-shared/.github/workflows/deploy-to-environments.yml@main
    with:
      artifactName: drop
      environment: test
      planEnvironment: test-plan

      deployAPI: true
      # deployFunctionApp: true

      deployTerraform: true
      terraformWorkingDirectory: 'devops_script/terraform'
      tfvarsFile: 'test.tfvars'
      terraformBackendConfigPath: 'devops_script/terraform/backendConfigs/test-backendConfig.yml'
      terraformEnableConcurrency: true

      variableYamlPath: 'devops_script/variables/test-vars.yml'

      wizEnabled: false
      wizPolicy: ''
      wizScanTags: 'cicd=gha,env=test'
      wizFailOnPolicyHit: false

      runner: ubuntu-latest
    secrets: inherit

  # ============================================================
  # DEPLOY ? PROD
  # ============================================================
  Deploy-Prod:
    needs: [ Deploy-Test ]
    uses: Allegion/allegion-platform-yaml-template-shared/.github/workflows/deploy-to-environments.yml@main
    with:
      artifactName: drop
      environment: prod
      planEnvironment: prod-plan

      deployAPI: true
      # deployFunctionApp: true

      deployTerraform: true
      terraformWorkingDirectory: 'devops_script/terraform'
      tfvarsFile: 'prod.tfvars'
      terraformBackendConfigPath: 'devops_script/terraform/backendConfigs/prod-backendConfig.yml'
      terraformEnableConcurrency: true

      variableYamlPath: 'devops_script/variables/prod-vars.yml'

      wizEnabled: false
      wizPolicy: ''
      wizScanTags: 'cicd=gha,env=prod'
      wizFailOnPolicyHit: false

      runner: ubuntu-latest
    secrets: inherit