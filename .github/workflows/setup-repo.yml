name: 'Setup Repository'
# ============================================================
# Run this ONCE after creating a repo from the Allegion template.
#
# HOW TO USE:
#   This workflow just prints a setup checklist as a job summary.
#   The actual setup (variables + environments) is done by running
#   scripts/setup-repo-variables.ps1 locally:
#
#     .\scripts\setup-repo-variables.ps1 -Repo "Allegion/<your-repo-name>"
#
# WHY NOT AUTOMATED HERE:
#   GITHUB_TOKEN cannot set repo variables or create environments in
#   org repos. A PAT with repo scope (gh auth login) is required,
#   which the local script uses via the GitHub CLI.
# ============================================================

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checklist:
    name: Setup Checklist
    runs-on: ubuntu-latest

    steps:
      - name: Print setup checklist
        run: |
          echo "## Repository Setup Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run the following PowerShell script **locally** to complete setup:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```powershell' >> $GITHUB_STEP_SUMMARY
          echo ".\scripts\setup-repo-variables.ps1 -Repo \"${{ github.repository }}\"" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The script will:" >> $GITHUB_STEP_SUMMARY
          echo "- Prompt for AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID and set them as repo variables" >> $GITHUB_STEP_SUMMARY
          echo "- Create the standard GitHub environments: dev-plan, dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manual steps after running the script" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Where |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Add BLACKDUCK_API_TOKEN secret | Settings > Secrets and variables > Actions > Secrets |" >> $GITHUB_STEP_SUMMARY
          echo "| Add SONARQUBE_TOKEN secret | Settings > Secrets and variables > Actions > Secrets |" >> $GITHUB_STEP_SUMMARY
          echo "| Fill in TODO items in dotnet-ci-cd.yml or angular-ci-cd.yml | Edit the workflow file |" >> $GITHUB_STEP_SUMMARY