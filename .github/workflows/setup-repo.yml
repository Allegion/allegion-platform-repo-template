name: 'Setup Repository'
# ============================================================
# Runs automatically on the first push after creating a repo
# from the Allegion template. Also triggerable manually.
#
# REQUIRES org secrets (set once by org admin):
#   PLATFORM_SETUP_APP_ID          - GitHub App ID
#   PLATFORM_SETUP_APP_PRIVATE_KEY - GitHub App private key (.pem)
#
# WHAT IT DOES (fully automated, no manual steps):
#   1. Creates blank repo variables to fill in after:
#      AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   2. Creates standard GitHub environments:
#      dev-plan, dev, test-plan, test, prod-plan, prod
# ============================================================

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/setup-repo.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    name: Setup Repo Variables & Environments
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PLATFORM_SETUP_APP_ID }}
          private-key: ${{ secrets.PLATFORM_SETUP_APP_PRIVATE_KEY }}

      - name: Create repo variables
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          gh variable set AZURE_CLIENT_ID       --repo "$REPO" --body "REPLACE_ME" || true
          gh variable set AZURE_TENANT_ID       --repo "$REPO" --body "REPLACE_ME" || true
          gh variable set AZURE_SUBSCRIPTION_ID --repo "$REPO" --body "REPLACE_ME" || true
          echo "Repo variables created - update values in Settings > Secrets and variables > Actions > Variables"

      - name: Create GitHub environments
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          for ENV in dev-plan test-plan prod-plan; do
            echo "Creating unprotected environment: $ENV"
            gh api --method PUT "repos/$REPO/environments/$ENV" --silent && echo "  OK" || echo "  WARNING: could not create $ENV"
          done
          for ENV in dev test prod; do
            echo "Creating protected environment: $ENV"
            gh api --method PUT "repos/$REPO/environments/$ENV" --silent && echo "  OK" || echo "  WARNING: could not create $ENV"
          done

      - name: Summary
        run: |
          echo "## Repository Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Variables created (update with real values)" >> $GITHUB_STEP_SUMMARY
          echo "Go to **Settings > Secrets and variables > Actions > Variables**" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| AZURE_CLIENT_ID | App Registration Client ID |" >> $GITHUB_STEP_SUMMARY
          echo "| AZURE_TENANT_ID | Azure AD Tenant ID |" >> $GITHUB_STEP_SUMMARY
          echo "| AZURE_SUBSCRIPTION_ID | Azure Subscription ID |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environments created" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Type |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| dev-plan | Unprotected (OIDC / no approval) |" >> $GITHUB_STEP_SUMMARY
          echo "| dev | Protected (requires reviewer approval) |" >> $GITHUB_STEP_SUMMARY
          echo "| test-plan | Unprotected (OIDC / no approval) |" >> $GITHUB_STEP_SUMMARY
          echo "| test | Protected (requires reviewer approval) |" >> $GITHUB_STEP_SUMMARY
          echo "| prod-plan | Unprotected (OIDC / no approval) |" >> $GITHUB_STEP_SUMMARY
          echo "| prod | Protected (requires reviewer approval) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Remaining steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Fill in the 3 Azure variables above" >> $GITHUB_STEP_SUMMARY
          echo "2. Add BLACKDUCK_API_TOKEN and SONARQUBE_TOKEN secrets if not already org secrets" >> $GITHUB_STEP_SUMMARY
          echo "3. Fill in the TODO items in .github/workflows/dotnet-ci-cd.yml or angular-ci-cd.yml" >> $GITHUB_STEP_SUMMARY